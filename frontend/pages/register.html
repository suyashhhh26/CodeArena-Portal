<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Join CodeArena — discover hackathons, track deadlines, and find your perfect team." />
  <title>CodeArena — Sign Up</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/auth.css" />
</head>
<body>

  <nav class="navbar">
    <a href="/pages/index.html" class="navbar__brand"><span>&lt;/&gt;</span> CodeArena</a>
    <ul class="navbar__links">
      <li><a href="/pages/hackathons.html">Discover</a></li>
      <li><a href="/pages/team-finder.html">Teams</a></li>
    </ul>
    <div class="navbar__actions">
      <a href="/pages/login.html" class="btn btn--ghost btn--sm">Log In</a>
    </div>
  </nav>

  <main class="auth-page">
    <form class="auth-card" id="register-form" novalidate>

      <div class="auth-card__brand">
        <span style="font-size:1.5rem">🚀</span>
        <span class="auth-card__brand-name">&lt;/&gt; CodeArena</span>
      </div>

      <h1 class="auth-card__title">Join the Arena</h1>
      <p class="auth-card__subtitle">Create your free account and start discovering hackathons</p>

      <!-- Role Selection -->
      <div class="form-group">
        <label>I am a...</label>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">
          <label class="role-option">
            <input type="radio" name="role" value="student" checked style="display:none">
            <div class="role-box" id="role-student">Student</div>
          </label>
          <label class="role-option">
            <input type="radio" name="role" value="organizer" style="display:none">
            <div class="role-box" id="role-organizer">Organizer</div>
          </label>
        </div>
      </div>

      <!-- Username -->
      <div class="form-group" id="group-username">
        <label for="username">Username</label>
        <div class="input-icon-wrapper">
          <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <input type="text" id="username" name="username" class="form-input" placeholder="hackathon_hunter" required autocomplete="username" />
        </div>
        <span class="form-hint" id="hint-username">3–30 characters, letters, numbers &amp; underscores only</span>
      </div>

      <!-- Email -->
      <div class="form-group" id="group-email">
        <label for="email">Email address</label>
        <div class="input-icon-wrapper">
          <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          <input type="email" id="email" name="email" class="form-input" placeholder="you@example.com" required autocomplete="email" />
        </div>
        <span class="form-hint" id="hint-email"></span>
      </div>

      <!-- Password -->
      <div class="form-group" id="group-password">
        <label for="password">Password</label>
        <div class="input-wrapper">
          <input type="password" id="password" name="password" class="form-input" placeholder="Min 6 characters" required autocomplete="new-password" />
          <button type="button" class="toggle-password" id="toggle-password" aria-label="Show/hide password">
            <svg class="eye-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <div class="strength-meter" id="strength-meter">
          <div class="strength-meter__bar" id="strength-bar"></div>
        </div>
        <span class="strength-label" id="strength-label"></span>
        <span class="form-hint" id="hint-password"></span>
      </div>

      <!-- Confirm Password -->
      <div class="form-group" id="group-confirm">
        <label for="confirm-password">Confirm Password</label>
        <div class="input-icon-wrapper">
          <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input type="password" id="confirm-password" name="confirm-password" class="form-input" placeholder="Re-enter your password" required autocomplete="new-password" />
        </div>
        <span class="form-hint" id="hint-confirm"></span>
      </div>

      <!-- Server error -->
      <div id="register-error" class="form-error hidden"></div>

      <!-- Submit -->
      <button type="submit" class="btn btn--primary btn--block" id="register-btn">
        <span class="btn__text">Create Account</span>
        <span class="spinner hidden" id="register-spinner"></span>
      </button>

      <p class="auth-card__footer">
        Already have an account? <a href="/pages/login.html">Log in →</a>
      </p>
    </form>
  </main>

  <div id="toast-container"></div>
  <script src="/js/app.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
