<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Log in to CodeArena to track hackathons, save opportunities, and find your team." />
  <title>CodeArena — Log In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/auth.css" />
</head>
<body>

  <nav class="navbar">
    <a href="/pages/index.html" class="navbar__brand"><span>&lt;/&gt;</span> CodeArena</a>
    <ul class="navbar__links">
      <li><a href="/pages/hackathons.html">Discover</a></li>
      <li><a href="/pages/team-finder.html">Teams</a></li>
    </ul>
    <div class="navbar__actions">
      <a href="/pages/register.html" class="btn btn--primary btn--sm">Sign Up Free</a>
    </div>
  </nav>

  <main class="auth-page">
    <form class="auth-card" id="login-form" novalidate>

      <div class="auth-card__brand">
        <span style="font-size:1.5rem">⚡</span>
        <span class="auth-card__brand-name">&lt;/&gt; CodeArena</span>
      </div>

      <h1 class="auth-card__title">Welcome back</h1>
      <p class="auth-card__subtitle">Log in to your CodeArena account</p>

      <!-- Email -->
      <div class="form-group" id="group-email">
        <label for="email">Email address</label>
        <div class="input-icon-wrapper">
          <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          <input type="email" id="email" name="email" class="form-input" placeholder="you@example.com" required autocomplete="email" />
        </div>
        <span class="form-hint" id="hint-email"></span>
      </div>

      <!-- Password -->
      <div class="form-group" id="group-password">
        <label for="password">Password</label>
        <div class="input-wrapper">
          <input type="password" id="password" name="password" class="form-input" placeholder="Enter your password" required autocomplete="current-password" />
          <button type="button" class="toggle-password" id="toggle-password" aria-label="Toggle password visibility">
            <svg class="eye-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <span class="form-hint" id="hint-password"></span>
      </div>

      <!-- Server error -->
      <div id="login-error" class="form-error hidden"></div>

      <!-- Submit -->
      <button type="submit" class="btn btn--primary btn--block" id="login-btn">
        <span class="btn__text">Log In</span>
        <span class="spinner hidden" id="login-spinner"></span>
      </button>

      <p class="auth-card__footer">
        Don't have an account? <a href="/pages/register.html">Sign up free →</a>
      </p>
    </form>
  </main>

  <div id="toast-container"></div>
  <script src="/js/app.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
